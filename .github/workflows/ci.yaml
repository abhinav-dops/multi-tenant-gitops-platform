on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-helm:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint tenant-app chart
        run: helm lint helm/tenant-app -f helm/values/tenant1-values.yaml

  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Template and validate
        run: |
          helm template tenant1 helm/tenant-app \
            -f helm/values/tenant1-values.yaml \
            --validate=false > /tmp/rendered.yaml
          echo "Rendered manifest line count: $(wc -l < /tmp/rendered.yaml)"
          cat /tmp/rendered.yaml

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform