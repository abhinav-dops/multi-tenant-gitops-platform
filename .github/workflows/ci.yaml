name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gitops-api

jobs:
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-checkov:
    name: SAST - Checkov (Terraform + K8s)
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Render Helm templates for scanning
        run: |
          helm template tenant1 helm/tenant-app \
            -f helm/values/tenant1-values.yaml \
            --validate=false > /tmp/rendered-manifests.yaml

      - name: Checkov - Scan Terraform
        run: |
          checkov -d terraform/ \
            --framework terraform \
            --hard-fail-on HIGH \
            --skip-check CKV_TF_1 \
            --output cli \
            --quiet
        continue-on-error: false

      - name: Checkov - Scan Kubernetes Manifests
        run: |
          checkov -f /tmp/rendered-manifests.yaml \
            --framework kubernetes \
            --hard-fail-on HIGH \
            --skip-check CKV_K8S_8,CKV_K8S_9,CKV_K8S_11,CKV_K8S_14,CKV_K8S_15,CKV_K8S_20,CKV_K8S_22,CKV_K8S_28,CKV_K8S_30,CKV_K8S_36,CKV_K8S_37,CKV_K8S_43 \
            --output cli \
            --quiet
        continue-on-error: false

  kyverno-policy-check:
    name: Kyverno Policy Validation
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Render Helm templates
        run: |
          helm template tenant1 helm/tenant-app \
            -f helm/values/tenant1-values.yaml \
            --validate=false > /tmp/rendered-manifests.yaml

      - name: Install Kyverno CLI
        run: |
          curl -LO https://github.com/kyverno/kyverno/releases/download/v1.12.0/kyverno-cli_v1.12.0_linux_x86_64.tar.gz
          mkdir -p /tmp/kyverno-cli
          tar -xzf kyverno-cli_v1.12.0_linux_x86_64.tar.gz -C /tmp/kyverno-cli
          sudo mv /tmp/kyverno-cli/kyverno /usr/local/bin/
          kyverno version

      - name: Run Kyverno policy checks
        run: |
          kyverno apply kyverno/policies/ \
            --resource /tmp/rendered-manifests.yaml

  lint-helm:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Lint tenant-app chart
        run: helm lint helm/tenant-app -f helm/values/tenant1-values.yaml

  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Template and validate
        run: |
          helm template tenant1 helm/tenant-app \
            -f helm/values/tenant1-values.yaml \
            --validate=false > /tmp/rendered.yaml
          echo "Rendered manifest line count: $(wc -l < /tmp/rendered.yaml)"

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform
      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint-helm, validate-manifests, validate-terraform, sast-checkov, kyverno-policy-check]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gitops-api
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/gitops-api:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          
      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/gitops-api:latest
          format: cyclonedx
          output: sbom.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30

      - name: Push image (only if Trivy passed)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          
      - name: Update image tags in values files
        if: github.ref == 'refs/heads/main'
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|tag:.*|tag: ${SHA}|g" helm/values/tenant1-values.yaml
          sed -i "s|tag:.*|tag: ${SHA}|g" helm/values/tenant2-values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values/tenant1-values.yaml helm/values/tenant2-values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tag to ${SHA} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}