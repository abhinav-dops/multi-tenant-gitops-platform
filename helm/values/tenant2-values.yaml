tenant: tenant2

replicaCount: 1

image:
  repository: ghcr.io/abhinav-dops/multi-tenant-gitops-platform/gitops-api
  tag: f3acf48
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  host: tenant2.app.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi

env:
  - name: TENANT_NAME
    value: "tenant2"